<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Latihan Form</title>
  </head>
  <body background="gambar/BGWHITE.jpg">
    <h2>FORMULIR:</h2>
    <br>
    <form>
      <label>Nama Anda</label>
      <input type="text" name="nama" placeholder="Nama Lengkap Anda..." size="30" maxlength="25">
      <br><br>
      <label>Password Anda</label>
      <input type="password" name="pass" placeholder="Password Anda..." size="30" maxlength="25">
      <br><br>
      <label>Email Anda</label>
      <input type="email" name="email" placeholder="...@gmail.com" size="30" maxlength="25">
      <br><br>
      <label>Warna Favorit</label>
      <input type="color" name="warna" placeholder="Pilih warna favorit Anda...">
      <br><br>

      <label>Tanggal Lahir</label>
      <input type="date" name="tgl_lahir">
      <br><br>

      <label>Nilai Ujian</label>
      <input type="number" name="nilai" min="0" max="10" placeholder="0-10" size="30" maxlength="25">
      <br><br>

      <label>Upload Foto</label>
      <input type="file" name="upload" placeholder="">
      <br><br>

      <label>Jenis Kelamin</label>
      <input type="radio" name="jk" value="L"> Laki-laki
      <input type="radio" name="jk" value="P"> Perempuan
      <br><br>

      <label>Hobi</label>
      <input type="checkbox" name="hobi" value="Baca Buku"> Baca Buku
      <input type="checkbox" name="hobi" value="Nonton Film"> Nonton Film
      <input type="checkbox" name="hobi" value="Berolahraga"> Berolahraga
      <input type="checkbox" name="hobi" value="Bermain Game"> Bermain Game
      <input type="text" name="hobi" placeholder="Hobi Lainnya..." size="30" maxlength="25">
      <br><br>

      <label>Pangkat/Gol</label>
      <select name="pangkat">
        <option value="Pilih">Pilih Pangkat/Gol?</option>
        <option value="Pama">PAMA</option>
        <option value="Bintara">BINTARA</option>
        <option value="Tamtama">TAMTAMA</option>
        <option value="Pns">PNS</option>
      </select>
      <br><br>

      <label>Kolom Komentar</label>
      <textarea name="Komentar" rows="5" cols="50" placeholder="Tulis komentar Anda disini..."></textarea>
      <br><br>
      <input type="submit" value="Simpan">
      <input type="reset" value="Batal">
    </form>

    <br><br><hr>
